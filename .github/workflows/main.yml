name: Kaizon Sovereign Bridge v54
on: [workflow_dispatch]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. بناء محرك الواتساب من "المواد الخام" (النجاح المضمون 100%)
      - name: 🛠️ Build Evolution API from Source
        run: |
          git clone --depth 1 https://github.com/EvolutionAPI/evolution-api.git
          cd evolution-api
          docker build -t evolution-api:latest .
          docker save evolution-api:latest | gzip > ../evolution.tar.gz
          cd ..

      # 2. جلب عقل البوت من مستودع Amazon (الممر العالمي المفتوح)
      - name: 🚀 Pull Typebot from Amazon Public ECR
        run: |
          # سحب النسخ العامة من أمازون (لا تطلب تسجيل دخول ولا تعطي Denied)
          docker pull public.ecr.aws/t8x4j6e3/typebot-builder:latest
          docker pull public.ecr.aws/t8x4j6e3/typebot-viewer:latest
          
          # تحويل الصور لملفات مضغوطة
          docker save public.ecr.aws/t8x4j6e3/typebot-builder:latest | gzip > studio.tar.gz
          docker save public.ecr.aws/t8x4j6e3/typebot-viewer:latest | gzip > viewer.tar.gz

      # 3. إنشاء الإصدار النهائي ورفع "الكنوز" الثلاثة
      - name: 🛡️ Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v54.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v54.0 - SUCCESS"
          files: |
            evolution.tar.gz
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
