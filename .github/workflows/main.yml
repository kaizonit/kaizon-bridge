name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

# حل مشكلة Node.js 24 التي ظهرت في رسالة الخطأ
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. سحب الصور باستخدام مرايا داخلية فائقة السرعة لتجنب الحظر
      - name: Pull Images
        run: |
          docker pull m.daocloud.io/docker.io/typebot/studio:latest
          docker pull m.daocloud.io/docker.io/typebot/viewer:latest
          docker pull m.daocloud.io/docker.io/evolutionapi/evolution-api:latest

      # 2. تحويل الصور إلى ملفات مضغوطة
      - name: Save and Compress
        run: |
          docker save m.daocloud.io/docker.io/typebot/studio:latest | gzip > studio.tar.gz
          docker save m.daocloud.io/docker.io/typebot/viewer:latest | gzip > viewer.tar.gz
          docker save m.daocloud.io/docker.io/evolutionapi/evolution-api:latest | gzip > evolution.tar.gz

      # 3. رفع الملفات إلى خزنة GitHub (Artifacts)
      - name: Upload Pack
        uses: actions/upload-artifact@v4
        with:
          name: kaizon-2026-pack
          path: |
            studio.tar.gz
            viewer.tar.gz
            evolution.tar.gz
          retention-days: 1
