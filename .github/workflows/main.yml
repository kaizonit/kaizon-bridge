name: Kaizon Sovereign Bridge v54
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo

      - name: 🚀 Force Fetch Typebot (Official 2026 Names)
        run: |
          # سحب عقل البوت (Builder) والواجهة (Viewer) بالأسماء الرسمية
          # استخدمنا مرآة m.daocloud.io لأنها الأقوى حالياً لتخطي حظر Docker Hub
          skopeo copy --src-no-creds docker://docker.m.daocloud.io/typebot/builder:latest docker-archive:studio.tar:typebot/studio:latest
          skopeo copy --src-no-creds docker://docker.m.daocloud.io/typebot/viewer:latest docker-archive:viewer.tar:typebot/viewer:latest

      - name: 🚀 Build Evolution API (The Proven Success)
        run: |
          git clone --depth 1 https://github.com/EvolutionAPI/evolution-api.git
          cd evolution-api
          docker build -t evolution-api:latest .
          docker save evolution-api:latest > ../evolution.tar
          cd ..

      - name: 📦 Create Final Sovereign Pack
        run: tar -cvzf kaizon_final_pack.tar.gz studio.tar viewer.tar evolution.tar

      - name: 📤 Upload to GitHub Vault
        uses: actions/upload-artifact@v4
        with:
          name: kaizon-master-package
          path: kaizon_final_pack.tar.gz
          retention-days: 1
