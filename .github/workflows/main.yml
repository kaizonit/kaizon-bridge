name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🚀 Pull Official Typebot Images (The Correct Names)
        run: |
          # المسميات الرسمية الصحيحة لعام 2026
          docker pull typebot/typebot-builder:latest
          docker pull typebot/typebot-viewer:latest
          
          # إعادة التسمية لكي تتوافق مع ملف zainab-island.yml الخاص بك
          docker tag typebot/typebot-builder:latest typebot/studio:latest
          docker tag typebot/typebot-viewer:latest typebot/viewer:latest
          
          # تحويل الصور لملفات مضغوطة
          docker save typebot/studio:latest | gzip > studio.tar.gz
          docker save typebot/viewer:latest | gzip > viewer.tar.gz

      - name: 🚀 Pull Evolution API (Verified Source)
        run: |
          # سحب نسخة Elestio المفتوحة والمضمونة
          docker pull elestio/evolution-api:latest
          docker save elestio/evolution-api:latest | gzip > evolution.tar.gz

      - name: 🛡️ Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v35.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v35.0 - THE LOOP BREAKER"
          files: |
            studio.tar.gz
            viewer.tar.gz
            evolution.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
