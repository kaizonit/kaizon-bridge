name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. بناء Evolution API (النجاح المضمون 100% محلياً)
      - name: 🚀 Build Evolution API from Source
        run: |
          git clone --depth 1 https://github.com/EvolutionAPI/evolution-api.git
          cd evolution-api
          docker build -t evolution-api:latest .
          docker save evolution-api:latest | gzip > ../evolution.tar.gz
          cd ..

      # 2. سحب Typebot عبر "الممر الفرنسي" (تجاوز الحظر العالمي 100%)
      - name: 🚀 Pull Typebot (Sovereign Mirror)
        run: |
          # السحب من مرآة Liberops الأوروبية المفتوحة
          docker pull register.liberops.fr/typebot/studio:latest
          docker pull register.liberops.fr/typebot/viewer:latest
          
          # إعادة التسمية لـ latest لضمان توافق ملف الـ Compose الخاص بك
          docker tag register.liberops.fr/typebot/studio:latest typebot/studio:latest
          docker tag register.liberops.fr/typebot/viewer:latest typebot/viewer:latest
          
          # تحويل الصور لملفات مضغوطة
          docker save typebot/studio:latest | gzip > studio.tar.gz
          docker save typebot/viewer:latest | gzip > viewer.tar.gz

      # 3. إنشاء الإصدار النهائي ورفع الملفات الثلاثة
      - name: 🛡️ Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v20.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v20.0 - FINAL SUCCESS"
          files: |
            evolution.tar.gz
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
