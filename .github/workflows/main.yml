name: Kaizon Sovereign Bridge v53
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Pull and Save Images (Verified Sources)
        run: |
          # سحب الصور باستخدام ممرات GitHub الداخلية (المضمونة 100%)
          docker pull elestio/typebot-studio:latest
          docker pull elestio/typebot-viewer:latest
          
          # تحويل الصور لملفات مادية
          docker save elestio/typebot-studio:latest -o studio.tar
          docker save elestio/typebot-viewer:latest -o viewer.tar
          
          # ضغط الملفات لتقليل الحجم
          tar -cvzf typebot_pack.tar.gz studio.tar viewer.tar

      - name: 📦 Upload to GitHub Vault
        uses: actions/upload-artifact@v4
        with:
          name: kaizon-typebot-pack
          path: typebot_pack.tar.gz
          retention-days: 1
