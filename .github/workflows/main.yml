name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. تنصيب أداة الحسم Skopeo (تتخطى أخطاء Docker Pull)
      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      # 2. بناء Evolution API من المصدر (النجاح المضمون الذي حققناه سابقاً)
      - name: 🚀 Build Evolution API from Source
        run: |
          git clone --depth 1 https://github.com/EvolutionAPI/evolution-api.git
          cd evolution-api
          docker build -t evolution-api:latest .
          docker save evolution-api:latest | gzip > ../evolution.tar.gz
          cd ..

      # 3. جلب Typebot باستخدام Skopeo (تجاوز حظر Docker Hub وخطأ المانيفست)
      - name: 🚀 Pull Typebot via Skopeo (Official Sources)
        run: |
          # سحب النسخ الرسمية v2.27.0 وتحويلها لملفات مباشرة (هذا المسار لا يمكن حظره)
          skopeo copy --src-no-creds docker://docker.io/typebot/studio:v2.27.0 docker-archive:studio.tar:typebot/studio:latest
          skopeo copy --src-no-creds docker://docker.io/typebot/viewer:v2.27.0 docker-archive:viewer.tar:typebot/viewer:latest
          
          # ضغط الملفات لتقليل الحجم وسرعة النقل
          gzip studio.tar
          gzip viewer.tar

      # 4. إنشاء الإصدار النهائي ورفع الملفات الثلاثة
      - name: 🛡️ Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v23.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v23.0 - MISSION COMPLETE"
          files: |
            evolution.tar.gz
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
