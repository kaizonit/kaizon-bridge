name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. بناء Evolution API (الذي نجحنا فيه 100% في محاولتك السابقة)
      - name: 🚀 Build Evolution API from Source
        run: |
          git clone --depth 1 https://github.com/EvolutionAPI/evolution-api.git
          cd evolution-api
          docker build -t evolution-api:latest .
          docker save evolution-api:latest | gzip > ../evolution.tar.gz
          cd ..

      # 2. سحب Typebot من مستودع GitHub المفتوح (يتخطى حظر Docker Hub تماماً)
      - name: 🚀 Pull Typebot from GHCR
        run: |
          # السحب من مستودع GitHub المضمون (Elestio Mirror on GHCR)
          docker pull ghcr.io/elestio-examples/typebot-studio:latest
          docker pull ghcr.io/elestio-examples/typebot-viewer:latest
          
          # تحويلها لملفات مضغوطة
          docker save ghcr.io/elestio-examples/typebot-studio:latest | gzip > studio.tar.gz
          docker save ghcr.io/elestio-examples/typebot-viewer:latest | gzip > viewer.tar.gz

      # 3. إنشاء الإصدار النهائي ورفع الملفات الثلاثة
      - name: 🛡️ Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v14.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v14.0 - FINAL"
          files: |
            evolution.tar.gz
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
