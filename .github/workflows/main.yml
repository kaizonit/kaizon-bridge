name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🚀 Pull from Amazon Global Registry (The Unstoppable Path)
        run: |
          # سحب الصور من مستودع أمازون العالمي (لا يرفض الطلب أبداً)
          docker pull public.ecr.aws/t8x4j6e3/typebot-builder:latest
          docker pull public.ecr.aws/t8x4j6e3/typebot-viewer:latest
          docker pull public.ecr.aws/v2p3g7r3/evolution-api:latest
          
          # إعادة التسمية لكي تتوافق مع ملف زينب (zainab-island.yml)
          docker tag public.ecr.aws/t8x4j6e3/typebot-builder:latest typebot/studio:latest
          docker tag public.ecr.aws/t8x4j6e3/typebot-viewer:latest typebot/viewer:latest
          docker tag public.ecr.aws/v2p3g7r3/evolution-api:latest evolutionapi/evolution-api:latest
          
          # تحويل الصور لملفات مضغوطة
          docker save typebot/studio:latest | gzip > studio.tar.gz
          docker save typebot/viewer:latest | gzip > viewer.tar.gz
          docker save evolutionapi/evolution-api:latest | gzip > evolution.tar.gz

      - name: 🛡️ Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v36.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v36.0 - SUCCESS"
          files: |
            studio.tar.gz
            viewer.tar.gz
            evolution.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
