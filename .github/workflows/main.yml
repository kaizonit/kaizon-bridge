name: Kaizon Sovereign Bridge v50
on: [workflow_dispatch]

jobs:
  build-and-transfer:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Pull and Save Images
        run: |
          # 1. سحب الصور (هنا سينجح لأن GitHub غير محظور)
          docker pull evolutionapi/evolution-api:latest
          docker pull typebot/typebot-builder:latest
          docker pull typebot/typebot-viewer:latest
          
          # 2. تحويل الصور لملفات مضغوطة
          docker save evolutionapi/evolution-api:latest | gzip > evolution.tar.gz
          docker save typebot/typebot-builder:latest | gzip > studio.tar.gz
          docker save typebot/typebot-viewer:latest | gzip > viewer.tar.gz

      - name: 📤 Generate Direct Download Links
        run: |
          # رفع الملفات لخدمة Transfer.sh العالمية للحصول على روابط HTTP مباشرة
          echo "### 🛡️ Kaizon Sovereign Download Links" >> $GITHUB_STEP_SUMMARY
          
          STUDIO_URL=$(curl --upload-file ./studio.tar.gz https://transfer.sh/studio.tar.gz)
          VIEWER_URL=$(curl --upload-file ./viewer.tar.gz https://transfer.sh/viewer.tar.gz)
          EVO_URL=$(curl --upload-file ./evolution.tar.gz https://transfer.sh/evolution.tar.gz)
          
          echo "- **Studio:** $STUDIO_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Viewer:** $VIEWER_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Evolution:** $EVO_URL" >> $GITHUB_STEP_SUMMARY
          
          # طباعة الروابط في اللوج أيضاً للضمان
          echo "Studio: $STUDIO_URL"
          echo "Viewer: $VIEWER_URL"
          echo "Evolution: $EVO_URL"
