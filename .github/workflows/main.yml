name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      # 1. بناء Evolution API (النجاح المضمون الذي حققناه سابقاً)
      - name: 🚀 Build Evolution API from Source
        run: |
          git clone --depth 1 https://github.com/EvolutionAPI/evolution-api.git
          cd evolution-api
          docker build -t evolution-api:latest .
          docker save evolution-api:latest | gzip > ../evolution.tar.gz
          cd ..

      # 2. سحب Typebot من مستودع GitHub الرسمي (باستخدام توثيق سيادي)
      - name: 🚀 Pull Typebot from GitHub Registry
        run: |
          # تسجيل الدخول لمستودع GitHub الداخلي لفتح الأبواب المغلقة
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # سحب النسخ الرسمية (المسارات المحدثة 100%)
          docker pull ghcr.io/typebot/typebot/studio:latest
          docker pull ghcr.io/typebot/typebot/viewer:latest
          
          # تحويلها لملفات مضغوطة
          docker save ghcr.io/typebot/typebot/studio:latest | gzip > studio.tar.gz
          docker save ghcr.io/typebot/typebot/viewer:latest | gzip > viewer.tar.gz

      # 3. إنشاء الإصدار النهائي ورفع الملفات الثلاثة
      - name: 🛡️ Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v18.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v18.0 - THE FINAL"
          files: |
            evolution.tar.gz
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
