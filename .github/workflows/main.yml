name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. بناء محرك الواتساب (النجاح المضمون)
      - name: 🚀 Build Evolution API from Source
        run: |
          git clone --depth 1 https://github.com/EvolutionAPI/evolution-api.git
          cd evolution-api
          docker build -t evolution-api:latest .
          docker save evolution-api:latest | gzip > ../evolution.tar.gz
          cd ..

      # 2. سحب عقل البوت باستخدام مرآة جوجل العالمية (تجاوز الحظر 100%)
      - name: 🚀 Pull Typebot via Google Mirror
        run: |
          # سحب الصور من ممر جوجل الآمن
          docker pull mirror.gcr.io/typebot/typebot-builder:latest
          docker pull mirror.gcr.io/typebot/typebot-viewer:latest
          
          # إعادة التسمية لكي يراها ملف الـ Compose الخاص بك
          docker tag mirror.gcr.io/typebot/typebot-builder:latest typebot/studio:latest
          docker tag mirror.gcr.io/typebot/typebot-viewer:latest typebot/viewer:latest
          
          # تحويل الصور لملفات مضغوطة
          docker save typebot/studio:latest | gzip > studio.tar.gz
          docker save typebot/viewer:latest | gzip > viewer.tar.gz

      # 3. إنشاء الإصدار النهائي ورفع الكنوز الثلاثة
      - name: 🛡️ Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v38.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v38.0 - THE FINAL"
          files: |
            evolution.tar.gz
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
