name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pull Evolution API (from GitHub Registry)
        run: |
          docker pull ghcr.io/evolution-api/evolution-api:latest
          docker save ghcr.io/evolution-api/evolution-api:latest -o evolution.tar

      - name: Pull Typebot Studio (from GitHub Registry)
        run: |
          docker pull ghcr.io/elestio-examples/typebot-studio:latest
          docker save ghcr.io/elestio-examples/typebot-studio:latest -o studio.tar

      - name: Pull Typebot Viewer (from GitHub Registry)
        run: |
          docker pull ghcr.io/elestio-examples/typebot-viewer:latest
          docker save ghcr.io/elestio-examples/typebot-viewer:latest -o viewer.tar

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kaizon-images
          path: |
            evolution.tar
            studio.tar
            viewer.tar
          retention-days: 1
