name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🚀 Pull from Amazon Global Registry (The Unstoppable Path)
        run: |
          # سحب الصور من مستودع أمازون العالمي (لا يرفض الطلب أبداً)
          # 1. محرك الواتساب
          docker pull public.ecr.aws/v2p3g7r3/evolution-api:latest
          docker save public.ecr.aws/v2p3g7r3/evolution-api:latest | gzip > evolution.tar.gz

          # 2. عقل البوت (Studio/Builder)
          docker pull public.ecr.aws/t8x4j6e3/typebot-builder:latest
          docker save public.ecr.aws/t8x4j6e3/typebot-builder:latest | gzip > studio.tar.gz

          # 3. واجهة البوت (Viewer)
          docker pull public.ecr.aws/t8x4j6e3/typebot-viewer:latest
          docker save public.ecr.aws/t8x4j6e3/typebot-viewer:latest | gzip > viewer.tar.gz

      - name: 🛡️ Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v48.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v48.0 - GUARANTEED"
          files: |
            evolution.tar.gz
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
