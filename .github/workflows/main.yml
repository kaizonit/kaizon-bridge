name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Pull and Save Typebot (Verified Public Source)
        run: |
          # سحب النسخ العامة المفتوحة من Elestio (تعمل 100% بدون قيود)
          docker pull elestio/typebot-studio:latest
          docker pull elestio/typebot-viewer:latest
          
          # تحويل الصور لملفات مضغوطة
          docker save elestio/typebot-studio:latest | gzip > studio.tar.gz
          docker save elestio/typebot-viewer:latest | gzip > viewer.tar.gz

      - name: Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack #${{ github.run_number }}"
          files: |
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
