name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. بناء Evolution API من المصدر (الذي ثبت نجاحه سابقاً)
      - name: 🚀 Build Evolution API
        run: |
          git clone --depth 1 https://github.com/EvolutionAPI/evolution-api.git
          cd evolution-api
          docker build -t evolution-api:latest .
          docker save evolution-api:latest | gzip > ../evolution.tar.gz
          cd ..

      # 2. بناء Typebot (Builder & Viewer) من المصدر (تجاوز الحصار تماماً)
      - name: 🚀 Build Typebot Stack
        run: |
          git clone --depth 1 https://github.com/baptisteArno/typebot.io.git
          cd typebot.io
          
          # بناء الـ Builder (الذي نسميه studio)
          docker build -t typebot-studio:latest -f apps/builder/Dockerfile .
          docker save typebot-studio:latest | gzip > ../studio.tar.gz
          
          # بناء الـ Viewer
          docker build -t typebot-viewer:latest -f apps/viewer/Dockerfile .
          docker save typebot-viewer:latest | gzip > ../viewer.tar.gz
          cd ..

      # 3. إنشاء الإصدار النهائي ورفع الملفات الثلاثة
      - name: 🛡️ Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v37.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v37.0 - THE FINAL VICTORY"
          files: |
            evolution.tar.gz
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
