name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🚀 Pulling with Triple-Source Logic
        run: |
          # دالة ذكية للسحب من عدة مصادر لضمان النجاح
          pull_image() {
            local target=$1
            local sources=($2)
            for src in "${sources[@]}"; do
              echo "Trying to pull $target from $src..."
              if docker pull $src; then
                docker tag $src $target
                echo "✅ Successfully pulled $target from $src"
                return 0
              fi
            done
            echo "❌ All sources failed for $target"
            return 1
          }

          # 1. سحب محرك الواتساب
          pull_image "evolution-api:latest" "evolutionapi/evolution-api:latest elestio/evolution-api:latest ghcr.io/evolution-api/evolution-api:latest"

          # 2. سحب عقل البوت (Studio)
          pull_image "typebot-studio:latest" "typebot/studio:latest elestio/typebot-studio:latest ghcr.io/typebot/studio:latest"

          # 3. سحب واجهة البوت (Viewer)
          pull_image "typebot-viewer:latest" "typebot/viewer:latest elestio/typebot-viewer:latest ghcr.io/typebot/viewer:latest"

      - name: 📦 Save and Compress
        run: |
          docker save evolution-api:latest | gzip > evolution.tar.gz
          docker save typebot-studio:latest | gzip > studio.tar.gz
          docker save typebot-viewer:latest | gzip > viewer.tar.gz

      - name: 🛡️ Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v6.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v6.0"
          files: |
            evolution.tar.gz
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
