name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Pull Evolution API (From Stable Mirror)
        run: |
          skopeo copy --src-no-creds docker://public.ecr.aws/v2p3g7r3/evolution-api:latest docker-archive:evolution.tar:evolutionapi/evolution-api:latest

      - name: Pull Typebot Studio (From Stable Mirror)
        run: |
          skopeo copy --src-no-creds docker://public.ecr.aws/v2p3g7r3/typebot-studio:latest docker-archive:studio.tar:typebot/studio:latest

      - name: Pull Typebot Viewer (From Stable Mirror)
        run: |
          skopeo copy --src-no-creds docker://public.ecr.aws/v2p3g7r3/typebot-viewer:latest docker-archive:viewer.tar:typebot/viewer:latest

      - name: Upload Images
        uses: actions/upload-artifact@v4
        with:
          name: kaizon-pack
          path: |
            evolution.tar
            studio.tar
            viewer.tar
          retention-days: 1
