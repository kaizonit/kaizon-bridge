name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Force Pull Evolution API
        run: |
          skopeo copy --src-no-creds docker://docker.io/evolutionapi/evolution-api:latest docker-archive:evolution.tar:evolutionapi/evolution-api:latest

      - name: Force Pull Typebot Studio
        run: |
          skopeo copy --src-no-creds docker://docker.io/typebot/studio:latest docker-archive:studio.tar:typebot/studio:latest

      - name: Force Pull Typebot Viewer
        run: |
          skopeo copy --src-no-creds docker://docker.io/typebot/viewer:latest docker-archive:viewer.tar:typebot/viewer:latest

      - name: Upload Sovereign Images
        uses: actions/upload-artifact@v4
        with:
          name: kaizon-sovereign-pack
          path: |
            evolution.tar
            studio.tar
            viewer.tar
          retention-days: 1
