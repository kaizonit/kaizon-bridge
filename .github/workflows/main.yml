name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. تنصيب أداة الحسم Skopeo
      - name: Install Skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo

      # 2. بناء Evolution API (الذي نجحنا فيه 100%)
      - name: 🚀 Build Evolution API from Source
        run: |
          git clone --depth 1 https://github.com/EvolutionAPI/evolution-api.git
          cd evolution-api
          docker build -t evolution-api:latest .
          docker save evolution-api:latest | gzip > ../evolution.tar.gz
          cd ..

      # 3. سحب Typebot باستخدام Skopeo (تجاوز أخطاء المانيفست والحظر)
      - name: 🚀 Pull Typebot via Skopeo
        run: |
          # سحب النسخ العامة من Elestio (المسارات المصححة 100%)
          skopeo copy --src-no-creds docker://docker.io/elestio/typebot-studio:latest docker-archive:studio.tar:typebot/studio:latest
          skopeo copy --src-no-creds docker://docker.io/elestio/typebot-viewer:latest docker-archive:viewer.tar:typebot/viewer:latest
          
          # ضغط الملفات لتقليل الحجم
          gzip studio.tar
          gzip viewer.tar

      # 4. إنشاء الإصدار ورفع الملفات الثلاثة النهائية
      - name: 🛡️ Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v13.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v13.0 - SUCCESS"
          files: |
            evolution.tar.gz
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
