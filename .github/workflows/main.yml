name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Pull from GitHub Official Registry (The Sovereign Path)
        run: |
          # سحب النسخ الرسمية من مستودع GitHub مباشرة (هذا لا يُحظر أبداً)
          docker pull ghcr.io/typebot/typebot/studio:latest
          docker pull ghcr.io/typebot/typebot/viewer:latest
          
          # تحويل الصور لملفات مضغوطة
          docker save ghcr.io/typebot/typebot/studio:latest | gzip > studio.tar.gz
          docker save ghcr.io/typebot/typebot/viewer:latest | gzip > viewer.tar.gz

      - name: Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v2.0"
          files: |
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
