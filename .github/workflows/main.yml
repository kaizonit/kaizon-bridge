name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🚀 Pull and Save Images (Official 2026 Names)
        run: |
          # 1. سحب محرك الواتساب (الاسم الرسمي الصحيح)
          docker pull docker.1panel.live/evolutionapi/evolution-api:latest
          docker tag docker.1panel.live/evolutionapi/evolution-api:latest evolution-api:latest
          
          # 2. سحب عقل البوت (الأسماء الرسمية الصحيحة لشركة Typebot)
          docker pull docker.1panel.live/typebot/typebot-builder:latest
          docker pull docker.1panel.live/typebot/typebot-viewer:latest
          
          # 3. إعادة التسمية لضمان توافق ملف الـ Compose الخاص بك
          docker tag docker.1panel.live/typebot/typebot-builder:latest typebot/studio:latest
          docker tag docker.1panel.live/typebot/typebot-viewer:latest typebot/viewer:latest
          
          # 4. تحويل الصور لملفات مضغوطة
          docker save evolution-api:latest | gzip > evolution.tar.gz
          docker save typebot/studio:latest | gzip > studio.tar.gz
          docker save typebot/viewer:latest | gzip > viewer.tar.gz

      - name: 🛡️ Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v46.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v46.0 - THE FINAL VICTORY"
          files: |
            evolution.tar.gz
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
