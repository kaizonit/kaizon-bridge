name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. إعداد دوكر بمحرك كسر الحظر
      - name: Setup Docker Mirror
        uses: docker-practice/actions-setup-docker@master

      # 2. سحب الصور وحفظها (ستنجح الآن لأن المحرك يستخدم مرايا داخلية لـ GitHub)
      - name: Pull and Save Typebot
        run: |
          docker pull typebot/studio:latest
          docker pull typebot/viewer:latest
          docker save typebot/studio:latest | gzip > studio.tar.gz
          docker save typebot/viewer:latest | gzip > viewer.tar.gz

      # 3. رفع الملفات إلى خزنة GitHub الآمنة (Artifacts)
      - name: Upload to GitHub Vault
        uses: actions/upload-artifact@v4
        with:
          name: typebot-sovereign-pack
          path: |
            studio.tar.gz
            viewer.tar.gz
          retention-days: 1
