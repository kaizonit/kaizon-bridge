name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. بناء Evolution API (الذي نجحنا في بنائه محلياً بنسبة 100%)
      - name: 🚀 Build Evolution API from Source
        run: |
          git clone --depth 1 https://github.com/EvolutionAPI/evolution-api.git
          cd evolution-api
          docker build -t evolution-api:latest .
          docker save evolution-api:latest | gzip > ../evolution.tar.gz
          cd ..

      # 2. جلب Typebot باستخدام نظام "الممرات المتعددة" (لضمان تجاوز الحظر)
      - name: 🚀 Pull Typebot (Multi-Mirror Protocol)
        run: |
          # قائمة بالمرايا العالمية الأكثر استقراراً لعام 2026
          MIRRORS=("public.ecr.aws/elestio" "docker.m.daocloud.io/elestio" "huecker.io/elestio")
          
          SUCCESS=false
          for mirror in "${MIRRORS[@]}"; do
            echo "Trying mirror: $mirror"
            if docker pull $mirror/typebot-studio:latest; then
              docker tag $mirror/typebot-studio:latest typebot-studio:latest
              docker pull $mirror/typebot-viewer:latest
              docker tag $mirror/typebot-viewer:latest typebot-viewer:latest
              echo "✅ SUCCESS WITH $mirror"
              SUCCESS=true
              break
            fi
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "❌ All mirrors failed. Trying direct source build as last resort..."
            docker pull elestio/typebot-studio:latest && SUCCESS=true
          fi
          
          if [ "$SUCCESS" = false ]; then exit 1; fi
          
          # تحويل الصور لملفات
          docker save typebot-studio:latest | gzip > studio.tar.gz
          docker save typebot-viewer:latest | gzip > viewer.tar.gz

      # 3. إنشاء الإصدار النهائي ورفع الملفات الثلاثة
      - name: 🛡️ Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v15.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v15.0 - THE RECOVERY"
          files: |
            evolution.tar.gz
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
