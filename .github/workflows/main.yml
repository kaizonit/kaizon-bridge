name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Pull and Save Images
        run: |
          # سحب الصور (سيرفرات GitHub تملك إنترنت عسكري غير محظور)
          docker pull evolutionapi/evolution-api:latest
          docker pull typebot/builder:latest
          docker pull typebot/viewer:latest
          
          # تحويل الصور لملفات Tar
          docker save evolutionapi/evolution-api:latest -o evolution.tar
          docker save typebot/builder:latest -o studio.tar
          docker save typebot/viewer:latest -o viewer.tar

      - name: 📦 Create Sovereign Pack
        uses: actions/upload-artifact@v4
        with:
          name: kaizon-sovereign-pack
          path: "*.tar"
          retention-days: 1
