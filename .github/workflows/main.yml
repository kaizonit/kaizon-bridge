name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pull Evolution API (Public Mirror)
        run: |
          docker pull elestio/evolution-api:latest
          docker save elestio/evolution-api:latest -o evolution.tar

      - name: Pull Typebot Studio (Public Mirror)
        run: |
          docker pull elestio/typebot-studio:latest
          docker save elestio/typebot-studio:latest -o studio.tar

      - name: Pull Typebot Viewer (Public Mirror)
        run: |
          docker pull elestio/typebot-viewer:latest
          docker save elestio/typebot-viewer:latest -o viewer.tar

      - name: Upload Images
        uses: actions/upload-artifact@v4
        with:
          name: kaizon-final-images
          path: |
            evolution.tar
            studio.tar
            viewer.tar
          retention-days: 1
