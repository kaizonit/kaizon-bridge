name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Pull and Save Typebot
        run: |
          docker pull typebot/studio:latest
          docker pull typebot/viewer:latest
          docker save typebot/studio:latest -o studio.tar
          docker save typebot/viewer:latest -o viewer.tar
          gzip studio.tar
          gzip viewer.tar

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          files: |
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
