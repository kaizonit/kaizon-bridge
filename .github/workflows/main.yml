name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Force Pull and Save Images
        run: |
          # سحب الصور (سيرفرات GitHub تملك إنترنت عسكري غير محظور)
          docker pull typebot/studio:latest
          docker pull typebot/viewer:latest
          
          # تحويل الصور لملفات مضغوطة
          docker save typebot/studio:latest | gzip > studio.tar.gz
          docker save typebot/viewer:latest | gzip > viewer.tar.gz

      - name: Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack #${{ github.run_number }}"
          files: |
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
