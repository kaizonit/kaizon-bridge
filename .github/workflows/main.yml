name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: 🔑 Authenticate with GitHub Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: 🚀 Pull Official Images (The Sovereign Path)
        run: |
          # السحب من مستودع GitHub الرسمي مباشرة باستخدام التوثيق
          docker pull ghcr.io/typebot/typebot/studio:latest
          docker pull ghcr.io/typebot/typebot/viewer:latest
          
          # إعادة التسمية للأسماء الأصلية
          docker tag ghcr.io/typebot/typebot/studio:latest typebot/studio:latest
          docker tag ghcr.io/typebot/typebot/viewer:latest typebot/viewer:latest

      - name: 📦 Save and Compress (Physical Injection)
        run: |
          docker save typebot/studio:latest | gzip > studio.tar.gz
          docker save typebot/viewer:latest | gzip > viewer.tar.gz

      - name: 🛡️ Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v5.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v5.0"
          files: |
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
