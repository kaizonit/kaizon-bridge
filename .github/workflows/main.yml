name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and Save Images
        run: |
          # سحب الصور (هنا سينجح لأن سيرفرات GitHub غير محظورة)
          docker pull typebot/studio:latest
          docker pull typebot/viewer:latest
          
          # تحويل الصور لملفات مضغوطة
          docker save typebot/studio:latest | gzip > studio.tar.gz
          docker save typebot/viewer:latest | gzip > viewer.tar.gz

      - name: Generate Direct Download Links
        run: |
          # رفع الملفات لخدمة التحميل المباشر
          echo "STUDIO_LINK=$(curl --upload-file ./studio.tar.gz https://transfer.sh/studio.tar.gz)" >> $GITHUB_STEP_SUMMARY
          echo "VIEWER_LINK=$(curl --upload-file ./viewer.tar.gz https://transfer.sh/viewer.tar.gz)" >> $GITHUB_STEP_SUMMARY
