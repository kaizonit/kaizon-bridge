name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🚀 Pull Images from Verified Public Mirror
        run: |
          # سحب النسخ العامة من Elestio (هذا الممر مفتوح 100% لعام 2026)
          docker pull ghcr.io/elestio-examples/typebot-studio:latest
          docker pull ghcr.io/elestio-examples/typebot-viewer:latest
          
          # تحويل الصور لملفات مضغوطة
          docker save ghcr.io/elestio-examples/typebot-studio:latest | gzip > studio.tar.gz
          docker save ghcr.io/elestio-examples/typebot-viewer:latest | gzip > viewer.tar.gz

      - name: 🛡️ Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v45.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v45.0 - THE VICTORY"
          files: |
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
