name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      # 1. تسجيل الدخول لمستودع GitHub الداخلي (لفتح الممر السيادي)
      - name: 🔑 Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 2. بناء محرك الواتساب (النجاح المضمون)
      - name: 🚀 Build Evolution API from Source
        run: |
          git clone --depth 1 https://github.com/EvolutionAPI/evolution-api.git
          cd evolution-api
          docker build -t evolution-api:latest .
          docker save evolution-api:latest | gzip > ../evolution.tar.gz
          cd ..

      # 3. سحب Typebot من مستودع GitHub الرسمي (المسار المضمون 100%)
      - name: 🚀 Pull Typebot from Official GHCR
        run: |
          # هذه هي المسارات الرسمية لشركة Typebot على GitHub
          docker pull ghcr.io/baptistearno/typebot-builder:latest
          docker pull ghcr.io/baptistearno/typebot-viewer:latest
          
          # إعادة التسمية لكي يراها ملف الـ Compose الخاص بك
          docker tag ghcr.io/baptistearno/typebot-builder:latest typebot/studio:latest
          docker tag ghcr.io/baptistearno/typebot-viewer:latest typebot/viewer:latest
          
          # تحويل الصور لملفات مضغوطة
          docker save typebot/studio:latest | gzip > studio.tar.gz
          docker save typebot/viewer:latest | gzip > viewer.tar.gz

      # 4. إنشاء الإصدار النهائي ورفع الكنوز الثلاثة
      - name: 🛡️ Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v39.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v39.0 - GUARANTEED"
          files: |
            evolution.tar.gz
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
