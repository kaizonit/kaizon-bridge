name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. إصلاح نظام العناوين داخل السيرفر (لضمان عدم حدوث no such host)
      - name: 🛠️ DNS & System Fix
        run: |
          sudo echo "nameserver 8.8.8.8" > /etc/resolv.conf
          sudo echo "nameserver 1.1.1.1" >> /etc/resolv.conf

      # 2. بناء Evolution API (النجاح المضمون الذي حققناه سابقاً)
      - name: 🚀 Build Evolution API from Source
        run: |
          git clone --depth 1 https://github.com/EvolutionAPI/evolution-api.git
          cd evolution-api
          docker build -t evolution-api:latest .
          docker save evolution-api:latest | gzip > ../evolution.tar.gz
          cd ..

      # 3. بناء Typebot Studio (بناء سيادي يتخطى حظر الصور)
      - name: 🚀 Build Typebot Studio from Source
        run: |
          git clone --depth 1 https://github.com/baptisteArno/typebot.io.git
          cd typebot.io
          # بناء الاستوديو (تم ضبط السياق ليتوافق مع هيكلية المشروع)
          docker build -t typebot-studio:latest -f apps/studio/Dockerfile .
          docker save typebot-studio:latest | gzip > ../studio.tar.gz
          cd ..

      # 4. بناء Typebot Viewer (بناء سيادي يتخطى حظر الصور)
      - name: 🚀 Build Typebot Viewer from Source
        run: |
          cd typebot.io
          # بناء العارض (تم ضبط السياق ليتوافق مع هيكلية المشروع)
          docker build -t typebot-viewer:latest -f apps/viewer/Dockerfile .
          docker save typebot-viewer:latest | gzip > ../viewer.tar.gz
          cd ..

      # 5. إنشاء الإصدار النهائي ورفع الكنوز الثلاثة
      - name: 🛡️ Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v21.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v21.0 - THE FINAL STRIKE"
          files: |
            evolution.tar.gz
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
