name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. بناء Evolution API (الذي نجحنا فيه 100% سابقاً)
      - name: 🚀 Build Evolution API from Source
        run: |
          git clone --depth 1 https://github.com/EvolutionAPI/evolution-api.git
          cd evolution-api
          docker build -t evolution-api:latest .
          docker save evolution-api:latest | gzip > ../evolution.tar.gz
          cd ..

      # 2. سحب Typebot من مستودع Amazon AWS المضمون (لا يحظر أحداً)
      - name: 🚀 Pull Typebot from AWS Public ECR
        run: |
          # سحب النسخ المستقرة من مستودع أمازون العالمي
          docker pull public.ecr.aws/t8x4j6e3/typebot-studio:latest
          docker pull public.ecr.aws/t8x4j6e3/typebot-viewer:latest
          
          # تحويلها لملفات مضغوطة
          docker save public.ecr.aws/t8x4j6e3/typebot-studio:latest | gzip > studio.tar.gz
          docker save public.ecr.aws/t8x4j6e3/typebot-viewer:latest | gzip > viewer.tar.gz

      # 3. إنشاء الإصدار النهائي ورفع الملفات الثلاثة
      - name: 🛡️ Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v17.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v17.0 - AWS POWER"
          files: |
            evolution.tar.gz
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
