name: Kaizon Sovereign Bridge
on: [workflow_dispatch]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. بناء Evolution API من المصدر (الذي نجحنا فيه بنسبة 100%)
      - name: 🚀 Build Evolution API from Source
        run: |
          git clone --depth 1 https://github.com/EvolutionAPI/evolution-api.git
          cd evolution-api
          docker build -t evolution-api:latest .
          docker save evolution-api:latest | gzip > ../evolution.tar.gz
          cd ..

      # 2. سحب Typebot باستخدام "الإصدارات المرقمة" (تجاوز حظر Latest و Manifest Unknown)
      - name: 🚀 Pull Typebot (Versioned Protocol)
        run: |
          # سحب النسخة المستقرة v2.27.0 (هذا المسار صلب ولا يطلب توثيق معقد)
          docker pull typebot/studio:v2.27.0
          docker pull typebot/viewer:v2.27.0
          
          # إعادة التسمية لـ latest لكي يعمل ملف الـ Compose الخاص بك دون تعديل
          docker tag typebot/studio:v2.27.0 typebot/studio:latest
          docker tag typebot/viewer:v2.27.0 typebot/viewer:latest
          
          # تحويل الصور لملفات مضغوطة
          docker save typebot/studio:latest | gzip > studio.tar.gz
          docker save typebot/viewer:latest | gzip > viewer.tar.gz

      # 3. إنشاء الإصدار النهائي ورفع الملفات الثلاثة
      - name: 🛡️ Create Sovereign Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v19.0.${{ github.run_number }}
          name: "Kaizon Sovereign Pack v19.0 - SOLID"
          files: |
            evolution.tar.gz
            studio.tar.gz
            viewer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
